<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng Ký - TàiNguyênMMO</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<style>
  body {
    margin: 0;
    padding: 0;
    font-family: 'Be Vietnam Pro', sans-serif;
    background: linear-gradient(135deg, #7028e4 0%, #4b11a8 100%);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-container {
    background: #ffffff;
    width: 100%;
    max-width: 420px;
    padding: 40px 30px;
    border-radius: 8px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    box-sizing: border-box;
  }

  .logo-box {
    text-align: center;
    margin-bottom: 20px;
  }

  .logo-box img {
    width: 50px;
    height: 50px;
    object-fit: contain;
  }

  .title {
    text-align: center;
    color: #1e293b;
    font-size: 24px;
    font-weight: 700;
    margin-top: 0;
    margin-bottom: 25px;
  }

  .input-group {
    margin-bottom: 16px;
  }

  .input-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #64748b;
    margin-bottom: 8px;
  }

  .input-group input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    color: #0f172a;
    box-sizing: border-box;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-group input:focus {
    border-color: #3b82f6;
  }

  .link {
    color: #3b82f6;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
  }

  .link:hover {
    text-decoration: underline;
  }

  .btn-login {
    width: 100%;
    background: #3b82f6;
    color: #ffffff;
    border: none;
    padding: 14px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 15px;
  }

  .btn-login:hover {
    background: #2563eb;
  }

  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 13px;
    color: #475569;
    font-weight: 500;
  }

  /* KHU VỰC BÁO LỖI HOẶC THÀNH CÔNG */
  #reg-msg {
    font-size: 13.5px;
    text-align: center;
    margin-bottom: 15px;
    font-weight: 600;
    min-height: 18px;
  }
</style>
</head>
<body>

<div class="login-container">
  <div class="logo-box">
    <img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" alt="Logo">
  </div>
  
  <h2 class="title">Đăng Ký Tài Khoản</h2>

  <div id="reg-msg"></div>

  <div class="input-group">
    <label>Tên đăng nhập</label>
    <input type="text" id="reg-user" placeholder="Viết liền không dấu">
  </div>

  <div class="input-group">
    <label>Địa chỉ Email</label>
    <input type="email" id="reg-email" placeholder="Dùng để khôi phục mật khẩu">
  </div>

  <div class="input-group">
    <label>Mật khẩu</label>
    <input type="password" id="reg-pass" placeholder="Nhập mật khẩu">
  </div>

  <div class="input-group">
    <label>Nhập lại mật khẩu</label>
    <input type="password" id="reg-pass-confirm" placeholder="Xác nhận lại mật khẩu">
  </div>

  <button class="btn-login" onclick="register()">Đăng Ký Ngay</button>

  <div class="footer">
    Đã có tài khoản? <a href="login.html" class="link">Đăng Nhập</a>
  </div>
</div>

<script>
  // KẾT NỐI FIREBASE CỦA BẠN
  const firebaseConfig = {
    apiKey: "AIzaSyDHvezBBdlUm3dkEClu1dPckBnXJmAK-2E",
    authDomain: "tainguyenmmo-1a233.firebaseapp.com",
    projectId: "tainguyenmmo-1a233",
    storageBucket: "tainguyenmmo-1a233.firebasestorage.app",
    messagingSenderId: "880959861709",
    appId: "1:880959861709:web:dfe8ce2253a90b87b10a84"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // Kiểm tra nếu đã login thì đá thẳng về trang chủ
  if (localStorage.getItem("currentUser")) {
    window.location.href = "index.html";
  }

  // XỬ LÝ ĐĂNG KÝ
  async function register() {
    const user = document.getElementById("reg-user").value.trim();
    const email = document.getElementById("reg-email").value.trim();
    const pass = document.getElementById("reg-pass").value;
    const passConfirm = document.getElementById("reg-pass-confirm").value;
    const msgBox = document.getElementById("reg-msg");

    // Xóa thông báo cũ mỗi lần bấm nút
    msgBox.textContent = ""; 

    // Kiểm tra form
    if(!user || !email || !pass) {
      msgBox.style.color = "#ef4444"; // Màu đỏ
      msgBox.textContent = "⚠️ Vui lòng điền đầy đủ thông tin!";
      return;
    }
    if(pass !== passConfirm) {
      msgBox.style.color = "#ef4444";
      msgBox.textContent = "⚠️ Mật khẩu nhập lại không khớp!";
      return;
    }

    // Hiện chữ đang xử lý
    msgBox.style.color = "#3b82f6"; // Màu xanh dương
    msgBox.textContent = "Đang xử lý...";

    try {
      const userRef = db.collection("users").doc(user);
      const docSnap = await userRef.get();
      
      if(docSnap.exists) {
        msgBox.style.color = "#ef4444";
        msgBox.textContent = "❌ Tên đăng nhập đã tồn tại!";
        return;
      }

      // Tạo mới tài khoản vào Firestore
      await userRef.set({ 
        username: user,
        email: email, 
        password: pass, 
        balance: 0,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
// Tạo mới tài khoản vào Firestore
      await userRef.set({ 
        username: user,
        email: email, 
        password: pass, 
        balance: 0,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      // --- DÁN THÊM DÒNG NÀY ĐỂ BẮN THÔNG BÁO VỀ TELEGRAM ---
      sendTelegramMsg(`🔥 KHÁCH ĐĂNG KÝ MỚI 🔥\n- Tài khoản: ${user}\n- Email: ${email}\n- Thời gian: ${new Date().toLocaleString('vi-VN')}`);
      // ------------------------------------------------------

      // Báo thành công màu xanh lá và chuyển hướng
      msgBox.style.color = "#10b981";
      // Báo thành công màu xanh lá và chuyển hướng
      msgBox.style.color = "#10b981";
      msgBox.textContent = "✅ Đăng ký thành công! Đang chuyển sang Đăng nhập...";
      
      setTimeout(() => {
        window.location.href = "login.html"; // Chuyển thẳng qua trang login
      }, 1500);

    } catch (error) {
      msgBox.style.color = "#ef4444";
      msgBox.textContent = "Lỗi kết nối máy chủ!";
      console.error(error);
    }
  }

  // Hỗ trợ bấm nút Enter để Đăng ký
  document.addEventListener("keypress", function(event) {
    if (event.key === "Enter") register();
  });
</script>

</body>
</html>
