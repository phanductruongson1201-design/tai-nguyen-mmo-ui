<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quên Mật Khẩu - TàiNguyênMMO</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<style>
  body {
    margin: 0; padding: 0; font-family: 'Be Vietnam Pro', sans-serif;
    background: linear-gradient(135deg, #7028e4 0%, #4b11a8 100%);
    height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .login-container {
    background: #ffffff; width: 100%; max-width: 420px; padding: 40px 30px;
    border-radius: 8px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); box-sizing: border-box;
  }
  .logo-box { text-align: center; margin-bottom: 20px; }
  .logo-box img { width: 50px; height: 50px; object-fit: contain; }
  .title { text-align: center; color: #1e293b; font-size: 24px; font-weight: 700; margin-top: 0; margin-bottom: 10px; }
  .subtitle { text-align: center; color: #64748b; font-size: 13.5px; margin-bottom: 25px; line-height: 1.5; }
  
  .input-group { margin-bottom: 16px; }
  .input-group label { display: block; font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: 8px; }
  .input-group input { width: 100%; padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 6px; font-family: inherit; font-size: 14px; color: #0f172a; box-sizing: border-box; outline: none; transition: border-color 0.2s; }
  .input-group input:focus { border-color: #3b82f6; }
  
  .link { color: #3b82f6; text-decoration: none; font-size: 13px; font-weight: 600; }
  .link:hover { text-decoration: underline; }
  
  .btn-submit { width: 100%; background: #3b82f6; color: #ffffff; border: none; padding: 14px; border-radius: 6px; font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
  .btn-submit:hover { background: #2563eb; }
  .btn-submit:disabled { background: #94a3b8; cursor: not-allowed; }
  
  .footer { text-align: center; margin-top: 24px; font-size: 13px; color: #475569; font-weight: 500; }
  
  #msg-box { font-size: 13.5px; text-align: center; margin-bottom: 15px; font-weight: 600; min-height: 18px; }
</style>
</head>
<body>

<div class="login-container">
  <div class="logo-box"><img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" alt="Logo"></div>
  <h2 class="title">Khôi Phục Mật Khẩu</h2>
  <div class="subtitle" id="subtitle-text">Nhập tên đăng nhập của bạn để nhận mã xác thực qua Email.</div>

  <div id="msg-box"></div>

  <div id="step-1">
    <div class="input-group">
      <label>Tên đăng nhập</label>
      <input type="text" id="forgot-user" placeholder="Nhập tên tài khoản cần khôi phục">
    </div>
    <button class="btn-submit" id="btn-step-1" onclick="sendResetCode()">Nhận mã qua Email</button>
  </div>

  <div id="step-2" style="display: none;">
    <div class="input-group">
      <label>Mã xác thực (6 số)</label>
      <input type="text" id="forgot-code" placeholder="Nhập mã từ email của bạn">
    </div>
    <div class="input-group">
      <label>Mật khẩu mới</label>
      <input type="password" id="forgot-new-pass" placeholder="Nhập mật khẩu mới">
    </div>
    <button class="btn-submit" onclick="resetPassword()">Cập Nhật Mật Khẩu</button>
  </div>

  <div class="footer">
    Nhớ mật khẩu? <a href="login.html" class="link">Đăng Nhập</a>
  </div>
</div>

<script>
  // 1. KẾT NỐI FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyDHvezBBdlUm3dkEClu1dPckBnXJmAK-2E",
    authDomain: "tainguyenmmo-1a233.firebaseapp.com",
    projectId: "tainguyenmmo-1a233",
    storageBucket: "tainguyenmmo-1a233.firebasestorage.app",
    messagingSenderId: "880959861709",
    appId: "1:880959861709:web:dfe8ce2253a90b87b10a84"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // 2. KHỞI TẠO EMAILJS (THAY PUBLIC KEY VÀO ĐÂY)
  (function(){
     emailjs.init("YOUR_PUBLIC_KEY"); 
  })();

  let resetTargetUser = "";
  let generatedResetCode = "";

  // BƯỚC 1: TÌM USER TRÊN FIREBASE VÀ GỬI MAIL
  async function sendResetCode() {
    const inputUser = document.getElementById("forgot-user").value.trim();
    const msgBox = document.getElementById("msg-box");
    const btnSend = document.getElementById("btn-step-1");

    msgBox.textContent = "";

    if(!inputUser) {
      msgBox.style.color = "#ef4444"; msgBox.textContent = "⚠️ Vui lòng nhập tên đăng nhập!"; return;
    }

    btnSend.textContent = "Đang tìm kiếm & gửi mail...";
    btnSend.disabled = true;

    try {
      const userRef = db.collection("users").doc(inputUser);
      const docSnap = await userRef.get();

      if(!docSnap.exists) {
        msgBox.style.color = "#ef4444"; msgBox.textContent = "❌ Không tìm thấy tài khoản này!";
        btnSend.textContent = "Nhận mã qua Email"; btnSend.disabled = false;
        return;
      }
      
      const targetEmail = docSnap.data().email;
      if(!targetEmail) {
        msgBox.style.color = "#ef4444"; msgBox.textContent = "❌ Tài khoản này chưa liên kết Email!";
        btnSend.textContent = "Nhận mã qua Email"; btnSend.disabled = false;
        return;
      }

      resetTargetUser = inputUser;
      generatedResetCode = Math.floor(100000 + Math.random() * 900000).toString();
      
      // GỬI MAIL QUA EMAILJS (THAY SERVICE ID VÀ TEMPLATE ID VÀO ĐÂY)
      emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", {
          to_email: targetEmail,
          user_name: inputUser,
          reset_code: generatedResetCode
      }).then(() => {
          // Gửi thành công -> Chuyển sang Bước 2
          document.getElementById("step-1").style.display = "none";
          document.getElementById("step-2").style.display = "block";
          document.getElementById("subtitle-text").style.display = "none";
          
          msgBox.style.color = "#10b981";
          msgBox.textContent = `✅ Đã gửi mã xác thực 6 số đến email: ${targetEmail}`;
      }).catch((error) => {
          msgBox.style.color = "#ef4444"; msgBox.textContent = "❌ Lỗi gửi email: Vui lòng kiểm tra lại cấu hình EmailJS.";
          btnSend.textContent = "Nhận mã qua Email"; btnSend.disabled = false;
          console.error(error);
      });

    } catch (error) {
      msgBox.style.color = "#ef4444"; msgBox.textContent = "🚨 Lỗi kết nối Firebase!";
      btnSend.textContent = "Nhận mã qua Email"; btnSend.disabled = false;
    }
  }

  // BƯỚC 2: CẬP NHẬT MẬT KHẨU LÊN FIREBASE
  async function resetPassword() {
    const inputCode = document.getElementById("forgot-code").value.trim();
    const newPass = document.getElementById("forgot-new-pass").value;
    const msgBox = document.getElementById("msg-box");
    
    if(inputCode !== generatedResetCode) {
      msgBox.style.color = "#ef4444"; msgBox.textContent = "⚠️ Mã xác thực không chính xác!"; return;
    }
    if(!newPass) {
      msgBox.style.color = "#ef4444"; msgBox.textContent = "⚠️ Vui lòng nhập mật khẩu mới!"; return;
    }
    
    msgBox.style.color = "#3b82f6"; msgBox.textContent = "Đang cập nhật mật khẩu...";

    try {
      const userRef = db.collection("users").doc(resetTargetUser);
      await userRef.update({ password: newPass });
      
      msgBox.style.color = "#10b981";
      msgBox.textContent = "✅ Đổi mật khẩu thành công! Đang chuyển hướng...";
      
      setTimeout(() => {
        window.location.href = "login.html";
      }, 1500);

    } catch (error) {
      msgBox.style.color = "#ef4444"; msgBox.textContent = "🚨 Lỗi khi đổi mật khẩu: " + error.message;
    }
  }
</script>

</body>
</html>
